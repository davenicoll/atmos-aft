# CT management account class. Holds Organizations/OU/CloudTrail org trail.
# Bootstrap role is OAAR — AtmosDeploymentRole is stamped in via step 5 of
# bootstrap.yaml (gha-design.md §5.8).
vars:
  account_class: ct-mgmt
  bootstrap_role: OrganizationAccountAccessRole
components:
  terraform:
    iam-deployment-roles/target:
      vars:
        account_class: ct-mgmt
