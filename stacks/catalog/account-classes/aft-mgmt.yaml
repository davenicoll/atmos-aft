# AFT management account class. Hosts AtmosCentralDeploymentRole, the central
# bootstrap bucket, account-provisioning, controltower-event-bridge.
# Bootstrap role is OAAR in dual-account topology; in single-account topology
# this merges with ct-mgmt.yaml.
vars:
  account_class: aft-mgmt
  bootstrap_role: OrganizationAccountAccessRole
components:
  terraform:
    iam-deployment-roles/target:
      vars:
        account_class: aft-mgmt
