# Central bootstrap state bucket - lives in AFT-mgmt account only. Holds state
# for github-oidc-provider, iam-deployment-roles/central, account-provisioning,
# and per-account bootstrap writes (see gha-design.md §5.8).
components:
  terraform:
    tfstate-backend-central:
      metadata:
        component: tfstate-backend-central
      vars:
        aft_mgmt_account_id: !template "{{ .settings.aft_mgmt_account_id }}"
        # Must produce the same string as terraform.backend.s3.bucket in
        # stacks/orgs/_defaults.yaml.
        bucket_name: !template "{{ .vars.tenant }}-{{ .vars.environment }}-{{ .vars.stage }}-{{ .vars.account_id }}"
