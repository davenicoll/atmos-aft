# Wraps cloudposse/terraform-aws-config's `conformance-pack` submodule only.
# The submodule deploys an AWS Config conformance pack from a template URL;
# it does NOT create a recorder or IAM role (CT owns both), so no
# create_recorder / create_iam_role flags are needed here.
#
# `conformance_pack_url` is required — every consuming stack must set it to a
# real template URL (e.g. one of the AWS-sample operational-best-practices
# packs under s3://awsconfigconforms-<region>/... or a custom template). The
# defaults block leaves it empty so an accidental import without override
# fails loudly at terraform plan instead of silently deploying nothing.
components:
  terraform:
    aws-config-conformance-pack:
      metadata:
        component: aws-config-conformance-pack
      vars:
        conformance_pack_url: ""
        parameter_overrides: {}
