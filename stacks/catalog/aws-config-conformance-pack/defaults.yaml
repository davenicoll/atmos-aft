# Wraps cloudposse/config/aws's `conformance-pack` submodule only. That
# submodule deploys a Config conformance pack from a template URL and does
# not create a recorder or IAM role, so the CT-coexistence flags that the
# top-level module accepts don't apply here.
#
# `conformance_pack_url` is required; the defaults block leaves it empty so
# an accidental import without override fails loudly at terraform plan.
components:
  terraform:
    aws-config-conformance-pack:
      metadata:
        component: aws-config-conformance-pack
      vars:
        conformance_pack_url: ""
        parameter_overrides: {}
