# Wraps cloudposse/terraform-aws-config's `cis-1-2-rules` submodule only.
# CT manages the AWS Config recorder itself — do NOT set vars that would try
# to create one here. Enforced by required_ct_flags.rego. The two flags below
# are defence-in-depth defaults so a stack-level override can't accidentally
# stamp a recorder/role that collides with the CT-managed ones.
components:
  terraform:
    aws-config-rules:
      metadata:
        component: aws-config-rules
      vars:
        create_recorder: false
        create_iam_role: false
