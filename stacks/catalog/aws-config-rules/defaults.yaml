# Wraps cloudposse/terraform-aws-config's `cis-1-2-rules` submodule only.
# The submodule deploys AWS Config managed/custom rules for CIS 1.2; it does
# NOT create a recorder or IAM role (CT owns both), so no create_recorder /
# create_iam_role flags are needed here — those belonged to the top-level
# terraform-aws-config module, which #36 deliberately stepped away from.
#
# `support_policy_arn` and `cloudtrail_bucket_name` are required by the
# submodule (see components/terraform/aws-config-rules/variables.tf); every
# consuming stack must set them to the real values for its account.
components:
  terraform:
    aws-config-rules:
      metadata:
        component: aws-config-rules
      vars: {}
