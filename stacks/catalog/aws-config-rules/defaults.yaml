# Wraps cloudposse/config/aws's `cis-1-2-rules` submodule only. That
# submodule deploys CIS 1.2 managed rules and does not create a recorder or
# IAM role, so the CT-coexistence flags that the top-level module accepts
# don't apply here.
#
# `support_policy_arn` and `cloudtrail_bucket_name` are required per stack
# (see components/terraform/aws-config-rules/variables.tf).
components:
  terraform:
    aws-config-rules:
      metadata:
        component: aws-config-rules
      vars: {}
