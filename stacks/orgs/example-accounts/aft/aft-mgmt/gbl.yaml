# Stack name: aft-gbl-mgmt
# Hosts: github-oidc-provider, AtmosCentralDeploymentRole (via iam-deployment-roles/central),
# AtmosDeploymentRole (aft-mgmt class), controltower-event-bridge, central bootstrap bucket,
# primary per-account tfstate-backend. Everything that makes the factory function.
import:
  - orgs/example-accounts/_defaults
  - mixins/tenant/aft
  - mixins/region/global
  - mixins/stage/mgmt
  - catalog/account-classes/aft-mgmt
  - catalog/tfstate-backend/defaults
  - catalog/tfstate-backend-central/defaults
  - catalog/iam-deployment-roles/central/defaults
  - catalog/iam-deployment-roles/target/defaults
  - catalog/github-oidc-provider/defaults
  - catalog/controltower-event-bridge/defaults
  - catalog/aws-account-settings/defaults

vars:
  account_id: "222222222222"
  account_name: aft-mgmt
