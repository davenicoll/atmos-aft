# Top-level defaults - merged into every stack under stacks/orgs/.
# Lift this file's `settings.aft_mgmt_account_id` / `github_org` / `github_repo`
# to environment-specific values in the per-org `_defaults.yaml`.
terraform:
  # Shared plugin cache - hardlinks each provider once across all components
  # instead of letting every `init` re-download a ~770MB AWS provider into
  # its own .terraform/. Without this, the components/ tree balloons past
  # 80GB. The dir is created on first use; safe to delete to reclaim space.
  env:
    TF_PLUGIN_CACHE_DIR: '{{ getenv "HOME" }}/.terraform.d/plugin-cache'
  backend_type: s3
  backend:
    s3:
      # Bucket pattern: {tenant}-{environment}-{stage}-{account_id}.
      # Each stack's bucket lives in its own target account (vars.account_id),
      # created by tfstate-backend-central for the central stack and by
      # tfstate-backend for each vended account.
      bucket: '{{ .vars.tenant }}-{{ .vars.environment }}-{{ .vars.stage }}-{{ .vars.account_id }}'
      # Bucket is already per-account-per-stack, so the key only needs to
      # disambiguate components within a single stack. Workspaces are
      # disabled in atmos.yaml so terraform won't prepend a workspace prefix.
      key: '{{ .component }}/terraform.tfstate'
      region: us-east-1
      encrypt: true
      use_lockfile: true
      dynamodb_table: ""
      workspace_key_prefix: ""

settings:
  description: atmos-aft - org-wide defaults
