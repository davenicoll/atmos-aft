# Top-level defaults — merged into every stack under stacks/orgs/.
# Lift this file's `settings.aft_mgmt_account_id` / `github_org` / `github_repo`
# to environment-specific values in the per-org `_defaults.yaml`.
terraform:
  backend_type: s3
  backend:
    s3:
      # Bucket pattern: {tenant}-{environment}-{stage}-{account_id}.
      # Each stack's bucket lives in its own target account (vars.account_id),
      # created by tfstate-backend-central for the central stack and by
      # tfstate-backend for each vended account.
      bucket: '{{ .vars.tenant }}-{{ .vars.environment }}-{{ .vars.stage }}-{{ .vars.account_id }}'
      key: '{{ .stack }}/{{ .component }}/terraform.tfstate'
      region: us-east-1
      encrypt: true
      use_lockfile: true
      dynamodb_table: ""
      workspace_key_prefix: ""

settings:
  description: atmos-aft — org-wide defaults
