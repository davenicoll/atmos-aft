name: ci-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_terratest:
        description: "Also run the Terratest tier (slow, may need AWS creds)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: static (atmos + fmt + validate + tflint)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.tf-plugin-cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-atmos
      - uses: ./.github/actions/install-gha-cli-deps
      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4.1.1
        with:
          tflint_version: v0.54.0
      - name: atmos validate stacks
        shell: bash
        run: atmos validate stacks
      - name: atmos describe stacks
        shell: bash
        run: atmos describe stacks --format json > "$RUNNER_TEMP/stacks.json"
      - name: terraform fmt -check -recursive
        shell: bash
        run: terraform fmt -check -recursive components/terraform
      - name: compute target component dirs
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          all_dirs() {
            find components/terraform -type f -name '*.tf' -not -path '*/.terraform/*' \
              -exec dirname {} \; | sort -u
          }
          targets="$RUNNER_TEMP/targets.txt"
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            all_dirs > "$targets"
            echo "scope: full (${{ github.event_name }})"
          else
            base_ref="${{ github.base_ref }}"
            changed=$(git diff --name-only "origin/$base_ref"...HEAD || true)
            if echo "$changed" | grep -qE '^(vendor\.yaml|\.tflint\.hcl|tflint\.hcl)'; then
              all_dirs > "$targets"
              echo "scope: full (trip-wire path changed)"
            else
              : > "$targets"
              while IFS= read -r f; do
                [[ -z "$f" || "$f" != components/terraform/* ]] && continue
                d="$(dirname "$f")"
                while [[ "$d" == components/terraform/* ]]; do
                  if compgen -G "$d/*.tf" >/dev/null; then
                    echo "$d" >> "$targets"
                    break
                  fi
                  d="$(dirname "$d")"
                done
              done <<< "$changed"
              sort -u "$targets" -o "$targets"
              echo "scope: changed ($(wc -l < "$targets") component(s))"
            fi
          fi
          if [[ -s "$targets" ]]; then
            echo "--- targets ---"; cat "$targets"
          else
            echo "no component dirs to validate/lint"
          fi
          echo "list_file=$targets" >> "$GITHUB_OUTPUT"
      - name: terraform validate (per component)
        shell: bash
        env:
          LIST_FILE: ${{ steps.targets.outputs.list_file }}
        run: |
          set -euo pipefail
          [[ -s "$LIST_FILE" ]] || { echo "no components to validate"; exit 0; }
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          failures=()
          while IFS= read -r dir; do
            echo "::group::$dir"
            if ! (cd "$dir" && terraform init -backend=false -input=false > /dev/null && terraform validate); then
              failures+=("$dir")
            fi
            echo "::endgroup::"
          done < "$LIST_FILE"
          if [[ ${#failures[@]} -gt 0 ]]; then
            printf '::error::terraform validate failed in:\n%s\n' "${failures[@]}"
            exit 1
          fi
      - name: tflint
        shell: bash
        env:
          LIST_FILE: ${{ steps.targets.outputs.list_file }}
        run: |
          set -euo pipefail
          [[ -s "$LIST_FILE" ]] || { echo "no components to lint"; exit 0; }
          while IFS= read -r dir; do
            echo "::group::$dir"
            (cd "$dir" && tflint --minimum-failure-severity=warning) || exit 1
            echo "::endgroup::"
          done < "$LIST_FILE"
      - name: terraform test (plan-only, per component with tests/)
        shell: bash
        env:
          LIST_FILE: ${{ steps.targets.outputs.list_file }}
        run: |
          set -euo pipefail
          [[ -s "$LIST_FILE" ]] || { echo "no components to test"; exit 0; }
          mkdir -p "$TF_PLUGIN_CACHE_DIR"
          ran=0
          while IFS= read -r dir; do
            [[ -d "$dir/tests" ]] || continue
            ran=$((ran+1))
            echo "::group::$dir"
            (cd "$dir" && terraform init -backend=false -input=false > /dev/null && terraform test)
            echo "::endgroup::"
          done < "$LIST_FILE"
          echo "ran terraform test in $ran component(s)"

  opa:
    name: opa (policy unit tests + conftest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: ./.github/actions/setup-atmos
      - uses: ./.github/actions/install-gha-cli-deps
      - name: opa test
        shell: bash
        run: opa test .github/policies tests/opa -v
      - name: conftest against stacks
        shell: bash
        run: |
          set -euo pipefail
          atmos describe stacks --format json --logs-level Error > /tmp/atmos-stacks.raw 2>/dev/null
          # Strip any progress prefix atmos emits on stdout before the JSON body
          sed -n '/^[[:space:]]*[{[]/,$p' /tmp/atmos-stacks.raw > /tmp/atmos-stacks.json
          conftest test --parser json --policy .github/policies --all-namespaces /tmp/atmos-stacks.json

  act:
    name: act (workflow smoke)
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        entry:
          - pr.yaml
          - push-main.yaml
          - provision-account.yaml
          - customize-fleet.yaml
          - drift-detection.yaml
          - destroy-account.yaml
          - bootstrap.yaml
          - import-existing-account.yaml
          - vendor-refresh.yaml
          - notify.yaml
          - ct-lifecycle-event.yaml
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Skip when entry workflow not yet landed
        id: gate
        shell: bash
        env:
          WF: .github/workflows/${{ matrix.entry }}
        run: |
          if [[ ! -f "$WF" ]]; then
            echo "::notice::entry workflow $WF not yet landed; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install act
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: curl -sSL https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin v0.2.68
      - name: act dry-run
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        env:
          WF: .github/workflows/${{ matrix.entry }}
          FIXTURE_DIR: tests/act/events
        run: |
          set -euo pipefail
          name="${WF##*/}"
          candidate="${FIXTURE_DIR}/${name%.yaml}.json"
          if [[ ! -f "$candidate" ]]; then
            echo "::error::missing act event fixture for $name (expected at $candidate)"
            exit 1
          fi
          # Workflows whose matrix is built at runtime via fromJSON() on a
          # prior job's output can't be statically evaluated by act - it
          # tries to parse the literal expression syntax as a JSON array
          # and fails. Skip those; they are still covered by atmos validate,
          # OPA policies, and real runs in deployment forks. (The literal
          # sequence is avoided here because GitHub evaluates ${} inside
          # run: blocks regardless of shell comment markers.)
          if grep -qE '\$\{\{[[:space:]]*fromJSON' "$WF"; then
            echo "::notice::$name uses a dynamic fromJSON matrix; skipping act smoke (act can't statically evaluate runtime matrices)"
            exit 0
          fi
          # act defaults to the `push` event when none is specified, so jobs
          # triggered only by workflow_dispatch/schedule/etc. would match zero
          # jobs. Map each entry workflow to its actual trigger.
          case "$name" in
            pr.yaml) event=pull_request ;;
            push-main.yaml) event=push ;;
            notify.yaml) event=workflow_run ;;
            ct-lifecycle-event.yaml) event=repository_dispatch ;;
            drift-detection.yaml|vendor-refresh.yaml) event=schedule ;;
            *) event=workflow_dispatch ;;
          esac
          # --list proves the workflow parses; --dryrun proves step graph resolves.
          # -P pins the runner image so act doesn't prompt interactively on first run.
          PLATFORM="-P ubuntu-latest=catthehacker/ubuntu:act-latest"
          act "$event" --list -W "$WF" -e "$candidate" $PLATFORM
          act "$event" --dryrun -W "$WF" -e "$candidate" $PLATFORM

  terratest:
    name: terratest (optional)
    needs: static
    if: |
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch' && inputs.run_terratest)
      || vars.RUN_TERRATEST_ON_PR == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.3.0
        with:
          go-version: '1.25.8'
          cache-dependency-path: tests/terratest/go.sum
      - uses: ./.github/actions/setup-atmos
      - uses: ./.github/actions/install-gha-cli-deps
      - name: Ensure go.sum is present
        shell: bash
        working-directory: tests/terratest
        run: |
          if [[ ! -f go.sum ]]; then
            go mod download
          fi
      - name: Run Terratest
        shell: bash
        working-directory: tests/terratest
        env:
          TT_ENABLE_TAGS: ${{ vars.TT_ENABLE_TAGS }}
        run: go test -v -timeout 90m -tags "$TT_ENABLE_TAGS" ./...
