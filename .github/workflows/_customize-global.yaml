name: _customize-global

on:
  workflow_call:
    inputs:
      target_stacks:
        required: true
        type: string
      customizations_source_ref:
        required: false
        type: string
        default: HEAD
      max_parallel:
        required: false
        type: number
        default: 20
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  customize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        stack: ${{ fromJson(inputs.target_stacks) }}
    env:
      AFT_BOOTSTRAP_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AFT_BOOTSTRAP_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          ref: ${{ inputs.customizations_source_ref }}
      - uses: ./.github/actions/setup-atmos
      - id: ctx
        uses: ./.github/actions/resolve-stack
        with:
          stack: ${{ matrix.stack }}
          component: customizations/global
          # Central-only stacks have no target account; let resolve-stack
          # report empty values rather than fail. configure-aws skips its
          # assume_role block when target_role_arn is empty.
          require_target: "false"
      - uses: ./.github/actions/configure-aws
        with:
          central_role_arn: ${{ vars.ATMOS_CENTRAL_ROLE_ARN }}
          target_role_arn: ${{ steps.ctx.outputs.target_role_arn }}
          region: ${{ steps.ctx.outputs.region }}
      - name: Pre-hook
        shell: bash
        env:
          STACK: ${{ matrix.stack }}
        run: |
          if [[ -x scripts/customize/pre-api-helpers.sh ]]; then
            scripts/customize/pre-api-helpers.sh "$STACK"
          fi
      - name: Apply global customizations
        shell: bash
        env:
          STACK: ${{ matrix.stack }}
        run: atmos terraform deploy customizations/global -s "$STACK" --ci
      - name: Post-hook
        shell: bash
        env:
          STACK: ${{ matrix.stack }}
        run: |
          if [[ -x scripts/customize/post-api-helpers.sh ]]; then
            scripts/customize/post-api-helpers.sh "$STACK"
          fi
      - name: Publish status
        uses: ./.github/actions/publish-status
        with:
          account_name: ${{ steps.ctx.outputs.account_name }}
          status: customized
          stack: ${{ matrix.stack }}
          region: ${{ steps.ctx.outputs.region }}
