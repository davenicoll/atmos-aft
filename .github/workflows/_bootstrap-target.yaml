name: _bootstrap-target
run-name: "bootstrap: ${{ inputs.component }} @ ${{ inputs.stack }}"

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
      component:
        required: true
        type: string
      fallback_role:
        description: >-
          Bootstrap role name used when the resolved stack does not set
          `vars.bootstrap_role` (per `stacks/catalog/account-classes/*.yaml`).
          The stack var is preferred; this input is kept as a belt-and-braces
          default for stacks where the account-class mixin has not been applied.
        required: false
        type: string
        default: AWSControlTowerExecution
      retry_attempts:
        required: false
        type: number
        default: 5
      retry_delay_seconds:
        required: false
        type: number
        default: 60
      region:
        required: false
        type: string
        default: ""
    outputs:
      apply_status:
        description: "succeeded | failed"
        value: ${{ jobs.bootstrap.outputs.apply_status }}
      resource_changes:
        description: "JSON summary of applied changes"
        value: ${{ jobs.bootstrap.outputs.resource_changes }}
    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      apply_status: ${{ steps.apply.outcome == 'success' && 'succeeded' || 'failed' }}
      resource_changes: ${{ steps.apply.outputs.resource_changes }}
    env:
      AFT_BOOTSTRAP_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AFT_BOOTSTRAP_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - uses: ./.github/actions/setup-atmos
      - id: ctx
        uses: ./.github/actions/resolve-stack
        with:
          stack: ${{ inputs.stack }}
          component: ${{ inputs.component }}
      - name: Resolve bootstrap role (stack var > fallback)
        id: role
        shell: bash
        env:
          STACK_ROLE: ${{ steps.ctx.outputs.bootstrap_role }}
          FALLBACK: ${{ inputs.fallback_role }}
        run: |
          set -euo pipefail
          role="${STACK_ROLE:-$FALLBACK}"
          case "$role" in
            AWSControlTowerExecution|OrganizationAccountAccessRole) ;;
            *) echo "::error::bootstrap_role must be AWSControlTowerExecution or OrganizationAccountAccessRole (got '$role')"; exit 1 ;;
          esac
          echo "role=$role" >> "$GITHUB_OUTPUT"
          echo "target_role_arn=arn:aws:iam::${{ steps.ctx.outputs.account_id }}:role/$role" >> "$GITHUB_OUTPUT"
      - name: Configure AWS (bootstrap identity)
        uses: ./.github/actions/configure-aws
        with:
          central_role_arn: ${{ vars.ATMOS_CENTRAL_ROLE_ARN }}
          target_role_arn: ${{ steps.role.outputs.target_role_arn }}
          region: ${{ inputs.region != '' && inputs.region || steps.ctx.outputs.region }}
          role_session_name: atmos-bootstrap-${{ inputs.stack }}-${{ github.run_id }}
          identity: bootstrap
      - id: apply
        name: Apply with bootstrap identity
        shell: bash
        env:
          STACK: ${{ inputs.stack }}
          COMPONENT: ${{ inputs.component }}
          ATTEMPTS: ${{ inputs.retry_attempts }}
          DELAY: ${{ inputs.retry_delay_seconds }}
        run: |
          set -euo pipefail
          attempt=1
          while :; do
            if atmos terraform deploy "$COMPONENT" -s "$STACK" --ci 2> "$RUNNER_TEMP/err.log"; then
              break
            fi
            if (( attempt >= ATTEMPTS )); then
              cat "$RUNNER_TEMP/err.log" >&2
              exit 1
            fi
            if grep -qiE 'eventual|throttl|not ?found|invalid.*identity|AccessDenied.*AssumeRole' "$RUNNER_TEMP/err.log"; then
              echo "::warning::bootstrap transient error, retry ${attempt}/${ATTEMPTS} in ${DELAY}s"
              sleep "$DELAY"
              attempt=$((attempt + 1))
              DELAY=$((DELAY * 3 / 2))
              continue
            fi
            cat "$RUNNER_TEMP/err.log" >&2
            exit 1
          done
          summary="$(atmos terraform output "$COMPONENT" -s "$STACK" --format json 2>/dev/null || echo '{}')"
          echo "resource_changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$summary" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
