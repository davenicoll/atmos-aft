name: setup-atmos
description: >-
  Install Atmos CLI and Terraform at pinned versions, seed ATMOS_* env vars,
  and restore the Atmos + .terraform cache. Versions are resolved from
  atmos.yaml when not passed explicitly.

inputs:
  atmos_version:
    description: Atmos CLI version to install. Defaults to the value at `integrations.atmos.version` in atmos.yaml, then to the built-in fallback.
    required: false
    default: ""
  terraform_version:
    description: Terraform version to install. Defaults to `components.terraform.version` in atmos.yaml, then to the built-in fallback.
    required: false
    default: ""
  atmos_config_path:
    description: Path to atmos.yaml, relative to repo root.
    required: false
    default: atmos.yaml
  cache:
    description: Whether to restore/save the Atmos and .terraform cache.
    required: false
    default: "true"

outputs:
  atmos_version:
    description: Atmos CLI version that was installed.
    value: ${{ steps.resolve.outputs.atmos_version }}
  terraform_version:
    description: Terraform version that was installed.
    value: ${{ steps.resolve.outputs.terraform_version }}

runs:
  using: composite
  steps:
    - name: Install yq
      shell: bash
      run: |
        if ! command -v yq >/dev/null 2>&1; then
          curl -sSL -o "$RUNNER_TEMP/yq" \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x "$RUNNER_TEMP/yq"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
        fi

    - name: Resolve versions
      id: resolve
      shell: bash
      env:
        INPUT_ATMOS_VERSION: ${{ inputs.atmos_version }}
        INPUT_TF_VERSION: ${{ inputs.terraform_version }}
        ATMOS_CONFIG: ${{ inputs.atmos_config_path }}
      run: |
        set -euo pipefail
        fallback_atmos="1.100.0"
        fallback_tf="1.14.9"
        atmos_v="$INPUT_ATMOS_VERSION"
        tf_v="$INPUT_TF_VERSION"
        if [[ -z "$atmos_v" && -f "$ATMOS_CONFIG" ]]; then
          atmos_v="$(yq -r '.integrations.atmos.version // ""' "$ATMOS_CONFIG")"
        fi
        if [[ -z "$tf_v" && -f "$ATMOS_CONFIG" ]]; then
          tf_v="$(yq -r '.components.terraform.version // ""' "$ATMOS_CONFIG")"
        fi
        atmos_v="${atmos_v:-$fallback_atmos}"
        tf_v="${tf_v:-$fallback_tf}"
        echo "atmos_version=$atmos_v" >> "$GITHUB_OUTPUT"
        echo "terraform_version=$tf_v" >> "$GITHUB_OUTPUT"

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ steps.resolve.outputs.terraform_version }}
        terraform_wrapper: false

    - name: Install Atmos
      uses: cloudposse/github-action-setup-atmos@v2
      with:
        atmos-version: ${{ steps.resolve.outputs.atmos_version }}

    - name: Restore Atmos + .terraform cache
      if: inputs.cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ~/.atmos
          components/terraform/**/.terraform
        key: atmos-${{ runner.os }}-${{ hashFiles(inputs.atmos_config_path, 'vendor.yaml') }}
        restore-keys: |
          atmos-${{ runner.os }}-

    - name: Seed ATMOS_* env
      shell: bash
      run: |
        echo "ATMOS_BASE_PATH=$PWD" >> "$GITHUB_ENV"
        echo "ATMOS_LOGS_LEVEL=Info" >> "$GITHUB_ENV"
        echo "ATMOS_CLI_CONFIG_PATH=$PWD" >> "$GITHUB_ENV"
